  <main>

    <!-- EMAIL SECTION -->
    <section id="email" class="contact" aria-label="Email Section">
      <h2>Email Me</h2>

      <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent!');">
        <label>
          <span>Name</span>
          <input type="text" required placeholder="Your name">
        </label>

        <label>
          <span>Email</span>
          <input type="email" required placeholder="you@example.com">
        </label>

        <label class="full">
          <span>Message</span>
          <textarea rows="4" required placeholder="Write your message..."></textarea>
        </label>

        <button class="btn">Send</button>
      </form>
    </section>
